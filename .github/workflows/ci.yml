name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  test:
    name: Test (pytest, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install workspace dependencies
        run: uv sync --all-packages --dev

      - name: Verify pytest available
        run: uv run python -m pytest --version

      - name: Run pytest (per-package)
        run: |
          FAILED=0
          for pkg in $(uv run python -c "
          import tomllib, pathlib
          root = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          for m in root['tool']['uv']['workspace']['members']:
            print(m)
          "); do
            if [ -d "$pkg/tests" ]; then
              echo "::group::pytest $pkg"
              uv run python -m pytest "$pkg/tests" --tb=short -q --rootdir="$pkg" --override-ini="addopts=" -p no:cacheprovider || FAILED=1
              echo "::endgroup::"
            fi
          done
          exit $FAILED

  type-check:
    name: Type check (pyright)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install workspace dependencies + pyright
        run: |
          uv sync --all-packages
          uv pip install pyright

      - name: Run pyright on lilith-core
        run: uv run pyright Asgard/lilith-core/lilith_core
        continue-on-error: true

      - name: Run pyright on lilith-memory
        run: uv run pyright Asgard/lilith-memory/lilith_memory
        continue-on-error: true

      - name: Run pyright on lilith-tools
        run: uv run pyright Asgard/lilith-tools/lilith_tools
        continue-on-error: true

      - name: Run pyright on vanaheim-framework
        run: uv run pyright Vanaheim/vanaheim-framework/vanaheim
        continue-on-error: true
