name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install uv
        run: pip install uv

      - name: Install Asgard dependencies
        run: |
          uv pip install -e Asgard/lilith-core
          uv pip install -e Asgard/lilith-memory
          uv pip install -e Asgard/lilith-tools
          uv pip install -e Asgard/lilith-orchestrator
          uv pip install -e Asgard/lilith-api
          uv pip install -e Asgard/lilith-cli

      - name: Install Vanaheim dependencies
        run: uv pip install -e Vanaheim/vanaheim-framework

      - name: Install Muspelheim dependencies
        run: |
          uv pip install -e Muspelheim/AutoSub
          uv pip install -e Muspelheim/ForgeMaster

      - name: Install Alfheim dependencies
        run: |
          uv pip install -e "Alfheim/TerminalDashboard[dev]"
          uv pip install -e Alfheim/dashboard

      - name: Run pytest (all packages)
        run: pytest

      - name: Install dev dependencies (for type checking)
        run: |
          uv pip install pyright pytest pytest-asyncio httpx
          uv pip install -e Asgard/lilith-core
          uv pip install -e Asgard/lilith-memory
          uv pip install -e Asgard/lilith-tools
          uv pip install -e Asgard/lilith-orchestrator
          uv pip install -e Asgard/lilith-api
          uv pip install -e Asgard/lilith-cli
          uv pip install -e Vanaheim/vanaheim-framework

  type-check:
    name: Type check (pyright)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv pip install pyright
          # Install packages so pyright can resolve imports
          uv pip install -e Asgard/lilith-core
          uv pip install -e Asgard/lilith-memory
          uv pip install -e Asgard/lilith-tools
          uv pip install -e Asgard/lilith-orchestrator
          uv pip install -e Asgard/lilith-api
          uv pip install -e Asgard/lilith-cli
          uv pip install -e Vanaheim/vanaheim-framework

      - name: Run pyright on lilith-core
        run: pyright Asgard/lilith-core/lilith_core
        continue-on-error: true

      - name: Run pyright on lilith-memory
        run: pyright Asgard/lilith-memory/lilith_memory
        continue-on-error: true

      - name: Run pyright on lilith-tools
        run: pyright Asgard/lilith-tools/lilith_tools
        continue-on-error: true

      - name: Run pyright on vanaheim-framework
        run: pyright Vanaheim/vanaheim-framework/vanaheim
        continue-on-error: true
