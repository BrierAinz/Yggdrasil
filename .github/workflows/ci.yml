name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: |
          ruff check . \
            --exclude Helheim \
            --exclude Muspelheim \
            --exclude Niflheim \
            --exclude __pycache__ \
            --exclude .git \
            --exclude "*.egg-info" \
            --exclude node_modules \
            --exclude .venv \
            --exclude venv

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio httpx
          # Install modular packages in dependency order
          pip install -e Asgard/lilith-core
          pip install -e Asgard/lilith-memory
          pip install -e Asgard/lilith-tools
          pip install -e Asgard/lilith-orchestrator
          pip install -e Asgard/lilith-api
          pip install -e Asgard/lilith-cli
          pip install -e Vanaheim/vanaheim-framework

      - name: Run pytest (lilith-core)
        run: pytest Asgard/lilith-core/tests

      - name: Run pytest (lilith-memory)
        run: pytest Asgard/lilith-memory/tests

      - name: Run pytest (lilith-tools)
        run: pytest Asgard/lilith-tools

      - name: Run pytest (lilith-orchestrator)
        run: pytest Asgard/lilith-orchestrator

      - name: Run pytest (lilith-api)
        run: pytest Asgard/lilith-api/tests

      - name: Run pytest (lilith-cli)
        run: pytest Asgard/lilith-cli/tests

      - name: Run pytest (vanaheim-framework)
        run: pytest Vanaheim/vanaheim-framework/tests

      - name: Install AutoSub dependencies
        run: |
          pip install -e Muspelheim/AutoSub

      - name: Run pytest (autosub)
        run: pytest Muspelheim/AutoSub/tests

      - name: Install ForgeMaster dependencies
        run: |
          pip install -e Muspelheim/ForgeMaster

      - name: Run pytest (forgemaster)
        run: pytest Muspelheim/ForgeMaster/tests

      - name: Install TerminalDashboard dependencies
        run: |
          pip install -e "Alfheim/TerminalDashboard[dev]"

      - name: Run pytest (terminaldashboard)
        run: pytest Alfheim/TerminalDashboard/tests

  type-check:
    name: Type check (pyright)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install pyright
          # Install packages so pyright can resolve imports
          pip install -e Asgard/lilith-core
          pip install -e Asgard/lilith-memory
          pip install -e Asgard/lilith-tools
          pip install -e Asgard/lilith-orchestrator
          pip install -e Asgard/lilith-api
          pip install -e Asgard/lilith-cli
          pip install -e Vanaheim/vanaheim-framework

      - name: Run pyright on lilith-core
        run: pyright Asgard/lilith-core/lilith_core
        continue-on-error: true

      - name: Run pyright on lilith-memory
        run: pyright Asgard/lilith-memory/lilith_memory
        continue-on-error: true

      - name: Run pyright on lilith-tools
        run: pyright Asgard/lilith-tools/lilith_tools
        continue-on-error: true

      - name: Run pyright on lilith-orchestrator
        run: pyright Asgard/lilith-orchestrator
        continue-on-error: true

      - name: Run pyright on lilith-api
        run: pyright Asgard/lilith-api/lilith_api
        continue-on-error: true

      - name: Run pyright on lilith-cli
        run: pyright Asgard/lilith-cli/lilith_cli
        continue-on-error: true

      - name: Run pyright on vanaheim-framework
        run: pyright Vanaheim/vanaheim-framework/vanaheim
        continue-on-error: true

  forgemaster-test:
    name: ForgeMaster Tests (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Muspelheim/ForgeMaster

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests -v

      - name: Run mypy
        run: mypy forgemaster/
        continue-on-error: true
