name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install workspace dependencies
        run: uv sync --all-packages

      - name: Run pytest (all packages)
        run: uv run pytest --tb=short -q

  type-check:
    name: Type check (pyright)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install workspace dependencies + pyright
        run: |
          uv sync --all-packages
          uv pip install pyright

      - name: Run pyright on lilith-core
        run: uv run pyright Asgard/lilith-core/lilith_core
        continue-on-error: true

      - name: Run pyright on lilith-memory
        run: uv run pyright Asgard/lilith-memory/lilith_memory
        continue-on-error: true

      - name: Run pyright on lilith-tools
        run: uv run pyright Asgard/lilith-tools/lilith_tools
        continue-on-error: true

      - name: Run pyright on vanaheim-framework
        run: uv run pyright Vanaheim/vanaheim-framework/vanaheim
        continue-on-error: true