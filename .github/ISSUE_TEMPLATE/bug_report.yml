name: Bug Report
description: Report something that isn't working as expected
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        > 🌳 Thank you for reporting a bug in Yggdrasil!
        > Please fill out the sections below to help us diagnose the issue.

  - type: dropdown
    id: realm
    attributes:
      label: Which Realm?
      description: Which realm does this bug relate to?
      options:
        - "🏰 Asgard (Core Technology)"
        - "🤖 Vanaheim (AI Agents)"
        - "✨ Alfheim (UI Prototypes)"
        - "📚 Svartalfheim (Knowledge Base)"
        - "🔥 Muspelheim (Active Development)"
        - "❄️ Niflheim (Resources)"
        - "🌍 Midgard (Personal Apps)"
        - "🐉 Jotunheim (Massive Projects)"
        - "☠️ Helheim (Graveyard)"
        - "🌐 Cross-realm / Infrastructure"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
      placeholder: "When I run..., the expected behavior is..., but instead..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Go to '...'
        2. Run command '...'
        3. See error
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs / Screenshots
      description: Paste relevant error logs, tracebacks, or screenshots.
      render: shell

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: What version of Python are you using?
      placeholder: "3.11.x"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS are you running?
      placeholder: "Windows 11 / Ubuntu 22.04 / macOS 14"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem. Configuration details, .env values (redacted!), LM Studio model, etc.
