<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Skuld — Future / Planning Agent (Norn) -->
  <!-- Compass + crystal ball + arrow, rose/magenta palette -->

  <circle cx="100" cy="100" r="90" fill="rgba(255,51,102,0.03)" stroke="rgba(255,51,102,0.12)" stroke-width="1"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(255,51,102,0.06)" stroke-width="0.5" stroke-dasharray="5,5"/>

  <!-- Crystal ball / scrying orb -->
  <circle cx="100" cy="95" r="35" fill="rgba(255,51,102,0.04)" stroke="#ff3366" stroke-width="1.5"/>
  <circle cx="100" cy="95" r="30" fill="none" stroke="rgba(255,51,102,0.1)" stroke-width="0.5"/>
  <!-- Inner glow -->
  <circle cx="100" cy="95" r="22" fill="rgba(255,51,102,0.06)"/>
  <circle cx="95" cy="88" r="8" fill="rgba(255,255,255,0.04)"/>
  <!-- Stars/visions inside -->
  <g fill="#ff3366" opacity="0.35">
    <circle cx="88" cy="88" r="1.2"/>
    <circle cx="108" cy="85" r="0.8"/>
    <circle cx="95" cy="100" r="1"/>
    <circle cx="105" cy="95" r="0.6"/>
    <circle cx="92" cy="108" r="0.8"/>
  </g>
  <!-- Swirl inside -->
  <path d="M90,85 Q95,80 102,83 Q108,88 105,95 Q100,100 95,97" fill="none" stroke="#ff3366" stroke-width="0.6" opacity="0.3"/>

  <!-- Compass rose around the orb -->
  <g stroke="rgba(255,51,102,0.25)" stroke-width="1" fill="none">
    <!-- N -->
    <line x1="100" y1="48" x2="100" y2="55"/>
    <polygon points="100,48 96,55 104,55" fill="rgba(255,51,102,0.3)" stroke="none"/>
    <!-- S -->
    <line x1="100" y1="135" x2="100" y2="142"/>
    <polygon points="100,142 97,135 103,135" fill="rgba(255,51,102,0.2)" stroke="none"/>
    <!-- E -->
    <line x1="142" y1="95" x2="148" y2="95"/>
    <!-- W -->
    <line x1="52" y1="95" x2="58" y2="95"/>
    <!-- Diagonals -->
    <line x1="124" y1="71" x2="128" y2="67"/>
    <line x1="72" y1="119" x2="68" y2="123"/>
    <line x1="128" y1="119" x2="132" y2="123"/>
    <line x1="72" y1="71" x2="68" y2="67"/>
  </g>

  <!-- Arrow pointing forward/future -->
  <g transform="translate(140,130)" opacity="0.5">
    <line x1="0" y1="0" x2="25" y2="-15" stroke="#ff3366" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="25,-15 18,-10 22,-20" fill="#ff3366" opacity="0.6"/>
  </g>

  <!-- Rune ᛊ (Sowilo - sun, victory — for Skuld) -->
  <g stroke="#ff3366" stroke-width="1.2" stroke-linecap="round" opacity="0.35" transform="translate(32,85)">
    <path d="M0,-10 L5,0 L0,10" fill="none"/>
    <line x1="0" y1="-10" x2="0" y2="10"/>
  </g>

  <!-- Floating runes -->
  <g fill="rgba(255,51,102,0.18)" font-family="serif" font-size="10">
    <text x="155" y="55">ᛉ</text>
    <text x="35" y="140">ᛏ</text>
    <text x="165" y="120">ᚠ</text>
  </g>

  <!-- Base glow -->
  <ellipse cx="100" cy="165" rx="40" ry="8" fill="rgba(255,51,102,0.04)"/>
</svg>
