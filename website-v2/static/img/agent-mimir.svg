<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Mimir — Memory / Knowledge Agent -->
  <!-- Well of wisdom + memory fragments + eye, emerald green palette -->

  <circle cx="100" cy="100" r="90" fill="rgba(0,255,136,0.03)" stroke="rgba(0,255,136,0.12)" stroke-width="1"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(0,255,136,0.06)" stroke-width="0.5" stroke-dasharray="2,6"/>

  <!-- Well of Mimir (bottom center) -->
  <path d="M60,135 Q60,125 70,120 L130,120 Q140,125 140,135 L138,160 Q138,170 130,172 L70,172 Q62,170 62,160 Z"
        fill="rgba(0,255,136,0.04)" stroke="#00ff88" stroke-width="1.2"/>
  <!-- Water surface -->
  <ellipse cx="100" cy="122" rx="33" ry="6" fill="rgba(0,255,136,0.08)" stroke="#00ff88" stroke-width="0.8"/>
  <!-- Ripple rings -->
  <ellipse cx="100" cy="122" rx="20" ry="3" fill="none" stroke="rgba(0,255,136,0.2)" stroke-width="0.5"/>
  <ellipse cx="100" cy="122" rx="28" ry="5" fill="none" stroke="rgba(0,255,136,0.12)" stroke-width="0.5"/>

  <!-- Memory fragments floating up from well -->
  <g opacity="0.5">
    <!-- Data fragment 1 -->
    <rect x="85" y="80" rx="2" width="16" height="8" fill="rgba(0,255,136,0.06)" stroke="#00ff88" stroke-width="0.6"/>
    <line x1="87" y1="83" x2="95" y2="83" stroke="#00ff88" stroke-width="0.4" opacity="0.5"/>
    <line x1="87" y1="85" x2="99" y2="85" stroke="#00ff88" stroke-width="0.3" opacity="0.3"/>

    <!-- Data fragment 2 -->
    <rect x="108" y="68" rx="2" width="14" height="7" fill="rgba(0,255,136,0.06)" stroke="#00ff88" stroke-width="0.6"/>
    <line x1="110" y1="71" x2="118" y2="71" stroke="#00ff88" stroke-width="0.4" opacity="0.5"/>

    <!-- Data fragment 3 -->
    <rect x="72" y="60" rx="2" width="12" height="6" fill="rgba(0,255,136,0.06)" stroke="#00ff88" stroke-width="0.6"/>
    <line x1="74" y1="63" x2="81" y2="63" stroke="#00ff88" stroke-width="0.4" opacity="0.5"/>

    <!-- Floating connection lines -->
    <line x1="93" y1="88" x2="105" y2="75" stroke="rgba(0,255,136,0.15)" stroke-width="0.5" stroke-dasharray="2,4"/>
    <line x1="115" y1="75" x2="84" y2="66" stroke="rgba(0,255,136,0.1)" stroke-width="0.5" stroke-dasharray="2,4"/>
  </g>

  <!-- Eye of Mimir (sacrificed to the well) -->
  <g transform="translate(108,48)">
    <ellipse cx="0" cy="0" rx="8" ry="5" fill="rgba(0,255,136,0.1)" stroke="#00ff88" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="2.5" fill="#00ff88" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Vector embedding visualization (small connected dots) -->
  <g fill="#00ff88" opacity="0.3">
    <circle cx="55" cy="90" r="1.5"/>
    <circle cx="60" cy="75" r="1"/>
    <circle cx="145" cy="88" r="1.5"/>
    <circle cx="148" cy="105" r="1"/>
    <circle cx="50" cy="110" r="1"/>
    <circle cx="152" cy="95" r="1.2"/>
  </g>
  <g stroke="#00ff88" stroke-width="0.3" opacity="0.15">
    <line x1="55" y1="90" x2="60" y2="75"/>
    <line x1="60" y1="75" x2="85" y2="68"/>
    <line x1="145" y1="88" x2="148" y2="105"/>
    <line x1="50" y1="110" x2="85" y2="88"/>
    <line x1="152" y1="95" x2="148" y2="105"/>
  </g>

  <!-- Rune ᛗ (Mannaz - human, self — for Mimir) -->
  <g stroke="#00ff88" stroke-width="1.2" stroke-linecap="round" opacity="0.35" transform="translate(35,140)">
    <line x1="0" y1="-10" x2="0" y2="10"/>
    <line x1="-5" y1="-5" x2="0" y2="0"/>
    <line x1="5" y1="-5" x2="0" y2="0"/>
    <line x1="-5" y1="5" x2="0" y2="0"/>
    <line x1="5" y1="5" x2="0" y2="0"/>
  </g>

  <!-- Floating runes -->
  <g fill="rgba(0,255,136,0.15)" font-family="serif" font-size="10">
    <text x="155" y="55">ᛖ</text>
    <text x="40" y="155">ᚠ</text>
    <text x="160" y="150">ᛉ</text>
  </g>

  <!-- Base glow -->
  <ellipse cx="100" cy="178" rx="45" ry="8" fill="rgba(0,255,136,0.03)"/>
</svg>
