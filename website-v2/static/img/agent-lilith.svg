<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#0b0f19"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
  <circle cx="100" cy="100" r="85" fill="#7c3aed" opacity="0.03"/>

  <!-- Crescent moon behind -->
  <circle cx="100" cy="70" r="35" fill="#1e1b4b" opacity="0.8"/>
  <circle cx="110" cy="65" r="30" fill="url(#bg)"/>

  <!-- Silhouette figure -->
  <g filter="url(#glow)">
    <!-- Head -->
    <circle cx="100" cy="62" r="14" fill="#2d1a4e" stroke="#7c3aed" stroke-width="1.5"/>
    <!-- Hair flowing -->
    <path d="M86 62 Q84 45 88 35 Q92 40 90 55" stroke="#7c3aed" stroke-width="1" fill="#2d1a4e" opacity="0.8"/>
    <path d="M114 62 Q116 45 112 35 Q108 40 110 55" stroke="#7c3aed" stroke-width="1" fill="#2d1a4e" opacity="0.8"/>
    <path d="M88 50 Q85 38 90 30" stroke="#a78bfa" stroke-width="0.8" fill="none" opacity="0.4"/>
    <path d="M112 50 Q115 38 110 30" stroke="#a78bfa" stroke-width="0.8" fill="none" opacity="0.4"/>
    <!-- Eyes -->
    <circle cx="95" cy="60" r="2" fill="#7c3aed" opacity="0.9"/>
    <circle cx="105" cy="60" r="2" fill="#7c3aed" opacity="0.9"/>
    <circle cx="95" cy="60" r="1" fill="#e0d4fc" opacity="0.6"/>
    <circle cx="105" cy="60" r="1" fill="#e0d4fc" opacity="0.6"/>
  </g>

  <!-- Body/robes -->
  <g filter="url(#glow)">
    <path d="M92 76 Q88 85 75 110 Q65 130 55 155 Q55 160 60 165 L100 170 L140 165 Q145 160 145 155 Q135 130 125 110 Q112 85 108 76Z" fill="#1a1030" stroke="#7c3aed" stroke-width="1.5"/>
    <!-- Robe details -->
    <path d="M100 76 L100 170" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
    <path d="M80 120 L100 170 L120 120" stroke="#7c3aed" stroke-width="0.5" fill="none" opacity="0.2"/>
  </g>

  <!-- Hands with magic -->
  <g filter="url(#softGlow)">
    <circle cx="65" cy="140" r="6" fill="#7c3aed" opacity="0.3"/>
    <circle cx="65" cy="140" r="3" fill="#a78bfa" opacity="0.5"/>
    <circle cx="135" cy="140" r="6" fill="#7c3aed" opacity="0.3"/>
    <circle cx="135" cy="140" r="3" fill="#a78bfa" opacity="0.5"/>
    <!-- Magic streams -->
    <path d="M65 140 Q70 130 78 125" stroke="#a78bfa" stroke-width="0.8" opacity="0.4"/>
    <path d="M135 140 Q130 130 122 125" stroke="#a78bfa" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Rune circle at feet -->
  <ellipse cx="100" cy="172" rx="20" ry="4" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>

  <!-- Floating runes -->
  <g font-family="serif" font-size="10" fill="#a78bfa" opacity="0.4" filter="url(#glow)">
    <text x="55" y="85">ᚱ</text>
    <text x="140" y="90">ᛏ</text>
    <text x="50" y="120">ᛖ</text>
    <text x="145" y="115">ᛉ</text>
  </g>

  <!-- Name -->
  <text x="100" y="193" text-anchor="middle" fill="#a78bfa" font-family="'Inter', sans-serif" font-size="11" font-weight="600" letter-spacing="4" opacity="0.9">LILITH</text>
</svg>
