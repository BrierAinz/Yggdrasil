<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 60" fill="none">
  <defs>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <text x="200" y="42" text-anchor="middle" fill="url(#textGrad)" font-family="'Inter', 'Segoe UI', sans-serif" font-size="36" font-weight="800" letter-spacing="8" filter="url(#glow)">YGGDRASIL</text>
  <text x="200" y="42" text-anchor="middle" fill="url(#textGrad)" font-family="'Inter', 'Segoe UI', sans-serif" font-size="36" font-weight="800" letter-spacing="8" opacity="0.3" dy="1">YGGDRASIL</text>
  <!-- Underline rune -->
  <line x1="60" y1="50" x2="340" y2="50" stroke="url(#textGrad)" stroke-width="0.5" opacity="0.3"/>
  <text x="200" y="58" text-anchor="middle" fill="#a78bfa" font-family="serif" font-size="8" letter-spacing="4" opacity="0.5">ᚱ ᛏ ᚻ ᛖ ᛉ ᛗ ᛭</text>
</svg>
