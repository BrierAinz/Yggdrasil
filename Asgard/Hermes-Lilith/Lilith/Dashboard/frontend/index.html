<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lilith Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <div class="header-left">
                <span class="logo">&#x2726;</span>
                <span class="title">LILITH</span>
                <span class="version">v3.0</span>
            </div>
            <div class="header-center">
                <div id="connection-status" class="status-dot disconnected" title="Disconnected"></div>
                <span id="status-text">Connecting...</span>
            </div>
            <div class="header-right">
                <button id="btn-layout" onclick="toggleLayout()" title="Toggle layout">&#9638;&#9638;&#9638;</button>
                <button id="btn-settings" onclick="toggleSettings()" title="Settings">&#x2699;</button>
            </div>
        </header>

        <!-- Main Content: Multi-Pane -->
        <main id="main-content">
            <!-- Chat Pane -->
            <div id="pane-chat" class="pane active">
                <div class="pane-header">
                    <span class="pane-icon">&#x1F4AC;</span>
                    <span class="pane-title">Chat</span>
                </div>
                <div class="pane-body" id="chat-body">
                    <div id="chat-messages"></div>
                </div>
                <div class="pane-footer">
                    <div class="chat-input-wrapper">
                        <input type="text" id="chat-input" placeholder="Send a message to Lilith..." autocomplete="off">
                        <button id="chat-send" onclick="sendChat()">&#x27A4;</button>
                    </div>
                </div>
            </div>

            <!-- Terminal Pane -->
            <div id="pane-terminal" class="pane">
                <div class="pane-header">
                    <span class="pane-icon">&#x2318;</span>
                    <span class="pane-title">Terminal</span>
                </div>
                <div class="pane-body">
                    <div id="terminal-output" class="terminal-content"></div>
                    <div class="terminal-input-line">
                        <span class="prompt">$</span>
                        <input type="text" id="terminal-input" placeholder="Enter command..." autocomplete="off">
                    </div>
                </div>
            </div>

            <!-- System Pane -->
            <div id="pane-system" class="pane">
                <div class="pane-header">
                    <span class="pane-icon">&#x2699;</span>
                    <span class="pane-title">System</span>
                </div>
                <div class="pane-body">
                    <div id="system-info" class="system-grid">
                        <div class="system-item">
                            <span class="system-label">Model</span>
                            <span class="system-value" id="sys-model">---</span>
                        </div>
                        <div class="system-item">
                            <span class="system-label">Memory</span>
                            <span class="system-value" id="sys-memory">---</span>
                        </div>
                        <div class="system-item">
                            <span class="system-label">Swarm</span>
                            <span class="system-value" id="sys-swarm">---</span>
                        </div>
                        <div class="system-item">
                            <span class="system-label">MCP</span>
                            <span class="system-value" id="sys-mcp">---</span>
                        </div>
                        <div class="system-item">
                            <span class="system-label">Uptime</span>
                            <span class="system-value" id="sys-uptime">---</span>
                        </div>
                        <div class="system-item">
                            <span class="system-label">Clients</span>
                            <span class="system-value" id="sys-clients">---</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Memory Pane -->
            <div id="pane-memory" class="pane">
                <div class="pane-header">
                    <span class="pane-icon">&#x1F9E0;</span>
                    <span class="pane-title">Memory</span>
                </div>
                <div class="pane-body">
                    <div class="memory-search">
                        <input type="text" id="memory-search-input" placeholder="Search memories..." autocomplete="off">
                    </div>
                    <div id="memory-results" class="memory-list"></div>
                </div>
            </div>
        </main>

        <!-- Status Bar -->
        <footer id="status-bar">
            <span id="statusbar-left">Lilith v3.0 | Dark Fantasy Dashboard</span>
            <span id="statusbar-center"></span>
            <span id="statusbar-right"></span>
        </footer>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Settings</h2>
                    <button class="modal-close" onclick="toggleSettings()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="setting-item">
                        <label>WebSocket URL</label>
                        <input type="text" id="setting-ws-url" value="ws://localhost:8765">
                    </div>
                    <div class="setting-item">
                        <label>Theme</label>
                        <select id="setting-theme">
                            <option value="dark-fantasy">Dark Fantasy</option>
                            <option value="midnight">Midnight</option>
                            <option value="blood-moon">Blood Moon</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>Chat Font Size</label>
                        <input type="range" id="setting-font-size" min="12" max="20" value="14">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
