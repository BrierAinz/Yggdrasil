<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{SITE_NAME}} — {{TAGLINE}}</title>
    <meta name="description" content="{{SITE_DESCRIPTION}}">
    <meta name="theme-color" content="#060810">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-rune">ᛒ</div>
        <div class="loading-bar"></div>
    </div>

    <!-- Mouse Glow -->
    <div id="mouse-glow" class="mouse-glow"></div>

    <!-- Runes Background Canvas -->
    <canvas id="runes-canvas"></canvas>

    <!-- Navigation -->
    <nav id="navbar" class="navbar">
        <div class="nav-container">
            <a href="#hero" class="nav-logo">
                <img src="logo.png" alt="ᛒ" class="nav-logo-img" onerror="this.style.display='none'">
                <span class="nav-logo-text">{{SITE_NAME_SHORT}}<span class="accent">{{SITE_NAME_REST}}</span></span>
            </a>
            <div class="nav-links" id="nav-links">
                <a href="#about">About</a>
                <a href="#projects">Projects</a>
                <a href="#contact">Contact</a>
            </div>
            <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="hero" class="hero">
        <div class="hero-particles" id="hero-particles"></div>
        <div class="hero-content">
            <!-- Rune Circle SVG -->
            <div class="rune-circle">
                <svg viewBox="0 0 200 200" class="rune-svg">
                    <defs>
                        <linearGradient id="runeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#7dd3fc"/>
                            <stop offset="50%" style="stop-color:#38bdf8"/>
                            <stop offset="100%" style="stop-color:#0284c7"/>
                        </linearGradient>
                        <filter id="runeGlow">
                            <feGaussianBlur stdDeviation="2" result="blur"/>
                            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                        </filter>
                    </defs>
                    <circle cx="100" cy="100" r="92" fill="none" stroke="url(#runeGrad)" stroke-width="1" opacity="0.3" class="rune-ring-outer"/>
                    <circle cx="100" cy="100" r="90" fill="none" stroke="url(#runeGrad)" stroke-width="0.5" opacity="0.2" class="rune-ring"/>
                    <circle cx="100" cy="100" r="70" fill="none" stroke="url(#runeGrad)" stroke-width="0.3" opacity="0.15" class="rune-ring-inner"/>
                    <circle cx="100" cy="100" r="50" fill="none" stroke="url(#runeGrad)" stroke-width="0.3" opacity="0.1" class="rune-ring-inner2"/>
                    <!-- Customize runes for your brand -->
                    <text x="100" y="16" text-anchor="middle" fill="#38bdf8" font-size="11" class="rune-char" filter="url(#runeGlow)">ᚺ</text>
                    <text x="158" y="46" text-anchor="middle" fill="#7dd3fc" font-size="11" class="rune-char" filter="url(#runeGlow)">ᛏ</text>
                    <text x="180" y="107" text-anchor="middle" fill="#38bdf8" font-size="11" class="rune-char" filter="url(#runeGlow)">ᛗ</text>
                    <text x="152" y="165" text-anchor="middle" fill="#818cf8" font-size="11" class="rune-char" filter="url(#runeGlow)">ᚨ</text>
                    <text x="48" y="165" text-anchor="middle" fill="#7dd3fc" font-size="11" class="rune-char" filter="url(#runeGlow)">ᛚ</text>
                    <text x="20" y="107" text-anchor="middle" fill="#38bdf8" font-size="11" class="rune-char" filter="url(#runeGlow)">ᛊ</text>
                    <text x="42" y="46" text-anchor="middle" fill="#818cf8" font-size="11" class="rune-char" filter="url(#runeGlow)">ᛒ</text>
                    <text x="100" y="196" text-anchor="middle" fill="#7dd3fc" font-size="11" class="rune-char" filter="url(#runeGlow)">ᚦ</text>
                </svg>
            </div>
            <h1 class="hero-title">
                <span class="title-line">Where <span class="glow">Ancient</span></span>
                <span class="title-line">Meets <span class="accent">Digital</span></span>
            </h1>
            <p class="hero-subtitle">{{TAGLINE}}</p>
            <div class="hero-cta">
                <a href="#projects" class="btn btn-primary">
                    <span class="btn-rune">᛭</span> Explore Our Work
                </a>
                <a href="#contact" class="btn btn-secondary">
                    Summon Us
                </a>
            </div>
            <div class="scroll-indicator">
                <div class="scroll-rune">᛭</div>
                <span>Scroll to descend</span>
            </div>
        </div>
    </section>

    <!-- Add sections following the same pattern: section-rune, section-title, divider-rune, content -->

    <script src="script.js"></script>
</body>
</html>
