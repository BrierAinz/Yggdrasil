<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Heimdall — Watchman / Monitoring Agent -->
  <!-- All-seeing eye + horn + rainbow, gold + cyan palette -->

  <circle cx="100" cy="100" r="90" fill="rgba(199,164,74,0.04)" stroke="rgba(34,136,170,0.15)" stroke-width="1"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(199,164,74,0.08)" stroke-width="0.5" stroke-dasharray="6,6"/>

  <!-- Gjallarhorn (Heimdall's horn) -->
  <g transform="translate(80,55)">
    <path d="M0,40 Q5,35 15,25 Q25,15 40,5 Q45,2 48,5 L42,15 Q30,25 20,35 Q15,40 10,42 Z"
          fill="rgba(199,164,74,0.08)" stroke="#C7A44A" stroke-width="1.2"/>
    <!-- Horn mouthpiece -->
    <ellipse cx="8" cy="42" rx="5" ry="3" fill="rgba(199,164,74,0.1)" stroke="#C7A44A" stroke-width="1"/>
    <!-- Sound waves from horn -->
    <path d="M50,5 Q58,-2 55,10" stroke="rgba(34,136,170,0.4)" stroke-width="0.8" fill="none"/>
    <path d="M48,0 Q60,-5 55,15" stroke="rgba(34,136,170,0.25)" stroke-width="0.6" fill="none"/>
    <path d="M46,-3 Q62,-8 58,18" stroke="rgba(34,136,170,0.15)" stroke-width="0.5" fill="none"/>
  </g>

  <!-- All-seeing eye -->
  <g transform="translate(100,130)">
    <!-- Eye outline -->
    <path d="M-25,0 Q-15,-18 0,-20 Q15,-18 25,0 Q15,18 0,20 Q-15,18 -25,0 Z"
          fill="rgba(34,136,170,0.08)" stroke="#2288aa" stroke-width="1.5"/>
    <!-- Iris -->
    <circle cx="0" cy="0" r="10" fill="rgba(34,136,170,0.15)" stroke="#2288aa" stroke-width="1"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="4" fill="rgba(34,136,170,0.6)">
      <animate attributeName="r" values="4;3;4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Glow -->
    <circle cx="0" cy="0" r="15" fill="none" stroke="rgba(34,136,170,0.15)" stroke-width="0.5"/>
  </g>

  <!-- Watchful rays from eye -->
  <g stroke="rgba(34,136,170,0.2)" stroke-width="0.5">
    <line x1="75" y1="130" x2="30" y2="115"/>
    <line x1="70" y1="130" x2="25" y2="130"/>
    <line x1="75" y1="130" x2="30" y2="145"/>
    <line x1="125" y1="130" x2="170" y2="115"/>
    <line x1="130" y1="130" x2="175" y2="130"/>
    <line x1="125" y1="130" x2="170" y2="145"/>
  </g>

  <!-- Rune ᚺ (Haglaz - hail, disruption — Heimdall signals Ragnarok) -->
  <g stroke="#2288aa" stroke-width="1.2" stroke-linecap="round" opacity="0.35" transform="translate(160,108)">
    <line x1="0" y1="-10" x2="0" y2="10"/>
    <line x1="-7" y1="-5" x2="7" y2="5"/>
  </g>

  <!-- Bifrost shimmer -->
  <g opacity="0.15">
    <circle cx="50" cy="50" r="2" fill="#aa55ff"/>
    <circle cx="150" cy="45" r="1.5" fill="#00ff88"/>
    <circle cx="45" cy="140" r="1.5" fill="#C7A44A"/>
    <circle cx="155" cy="145" r="2" fill="#ff3366"/>
  </g>

  <!-- Floating runes -->
  <g fill="rgba(199,164,74,0.15)" font-family="serif" font-size="10">
    <text x="30" y="80">ᚱ</text>
    <text x="160" y="170">ᛏ</text>
  </g>

  <!-- Base glow -->
  <ellipse cx="100" cy="175" rx="40" ry="8" fill="rgba(34,136,170,0.04)"/>
</svg>
