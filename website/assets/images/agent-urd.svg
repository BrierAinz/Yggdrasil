<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Urd — Past / History Agent (one of the Norns) -->
  <!-- Scroll + hourglass + roots, amber/gold palette -->

  <circle cx="100" cy="100" r="90" fill="rgba(199,164,74,0.03)" stroke="rgba(199,164,74,0.12)" stroke-width="1"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(199,164,74,0.06)" stroke-width="0.5" stroke-dasharray="4,7"/>

  <!-- Yggdrasil roots (from below, representing past/origin) -->
  <g stroke="#C7A44A" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M100,175 Q95,160 70,145 Q55,138 40,135"/>
    <path d="M100,175 Q105,158 130,140 Q145,132 165,128"/>
    <path d="M100,175 Q100,155 100,130"/>
  </g>
  <g fill="#C7A44A" opacity="0.2">
    <circle cx="40" cy="135" r="3"/>
    <circle cx="165" cy="128" r="3"/>
    <circle cx="100" cy="130" r="2.5"/>
  </g>

  <!-- Scroll of Urd -->
  <g transform="translate(72,60)">
    <!-- Scroll body -->
    <rect x="8" y="8" width="42" height="55" rx="1" fill="rgba(199,164,74,0.06)" stroke="#C7A44A" stroke-width="1"/>
    <!-- Scroll handles -->
    <rect x="4" y="5" rx="3" width="50" height="6" fill="rgba(199,164,74,0.1)" stroke="#C7A44A" stroke-width="1"/>
    <rect x="4" y="60" rx="3" width="50" height="6" fill="rgba(199,164,74,0.1)" stroke="#C7A44A" stroke-width="1"/>
    <!-- Text lines on scroll -->
    <g stroke="#C7A44A" stroke-width="0.5" opacity="0.35">
      <line x1="15" y1="20" x2="43" y2="20"/>
      <line x1="15" y1="26" x2="40" y2="26"/>
      <line x1="15" y1="32" x2="45" y2="32"/>
      <line x1="15" y1="38" x2="38" y2="38"/>
      <line x1="15" y1="44" x2="42" y2="44"/>
      <line x1="15" y1="50" x2="35" y2="50"/>
    </g>
  </g>

  <!-- Hourglass (time/past) -->
  <g transform="translate(140,70)" opacity="0.5">
    <path d="M0,0 L18,0 L9,18 Z" fill="none" stroke="#C7A44A" stroke-width="1"/>
    <path d="M0,36 L18,36 L9,18 Z" fill="none" stroke="#C7A44A" stroke-width="1"/>
    <line x1="0" y1="0" x2="18" y2="0" stroke="#C7A44A" stroke-width="1.2"/>
    <line x1="0" y1="36" x2="18" y2="36" stroke="#C7A44A" stroke-width="1.2"/>
    <!-- Sand -->
    <path d="M3,33 Q9,28 15,33 L15,36 L3,36 Z" fill="rgba(199,164,74,0.15)"/>
    <line x1="9" y1="18" x2="9" y2="25" stroke="#C7A44A" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Rune ᚢ (Uruz - strength, wild ox — for Urd) -->
  <g stroke="#C7A44A" stroke-width="1.2" stroke-linecap="round" opacity="0.35" transform="translate(30,75)">
    <line x1="0" y1="-10" x2="0" y2="10"/>
    <path d="M0,-10 L10,0 L0,10" fill="none"/>
  </g>

  <!-- Floating runes -->
  <g fill="rgba(199,164,74,0.18)" font-family="serif" font-size="10">
    <text x="35" y="50">ᚠ</text>
    <text x="160" y="140">ᛊ</text>
    <text x="170" y="48">ᚱ</text>
  </g>

  <!-- Base glow -->
  <ellipse cx="100" cy="185" rx="55" ry="10" fill="rgba(199,164,74,0.04)"/>
</svg>
