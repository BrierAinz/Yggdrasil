<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" fill="none">
  <defs>
    <!-- Gradients -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="40%" stop-color="#0d1b2a"/>
      <stop offset="70%" stop-color="#1b2838"/>
      <stop offset="100%" stop-color="#0b0f19"/>
    </linearGradient>
    <linearGradient id="treeGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="50%" stop-color="#2d3748"/>
      <stop offset="100%" stop-color="#1a202c"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#4c1d95" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a1a" stop-opacity="0"/>
    </radialGradient>
    <!-- Aurora effect -->
    <linearGradient id="auroraGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="20%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#06b6d4" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#00ff88" stop-opacity="0.15"/>
      <stop offset="80%" stop-color="#7c3aed" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <!-- Rune glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Mist -->
    <filter id="mist">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="600" fill="url(#skyGrad)"/>

  <!-- Aurora -->
  <ellipse cx="960" cy="80" rx="800" ry="120" fill="url(#auroraGrad)">
    <animate attributeName="opacity" values="0.6;0.8;0.6" dur="8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="960" cy="100" rx="600" ry="80" fill="url(#auroraGrad)" opacity="0.5">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Stars -->
  <g opacity="0.6">
    <circle cx="120" cy="45" r="1.5" fill="#e2e8f0"/><circle cx="340" cy="72" r="1" fill="#cbd5e1"/>
    <circle cx="560" cy="30" r="1.5" fill="#e2e8f0"/><circle cx="780" cy="55" r="1" fill="#a78bfa"/>
    <circle cx="1100" cy="38" r="1.5" fill="#e2e8f0"/><circle cx="1350" cy="65" r="1" fill="#cbd5e1"/>
    <circle cx="1560" cy="28" r="1.5" fill="#a78bfa"/><circle cx="1780" cy="50" r="1" fill="#e2e8f0"/>
    <circle cx="250" cy="100" r="1" fill="#94a3b8"/><circle cx="670" cy="88" r="1.5" fill="#e2e8f0"/>
    <circle cx="1200" cy="95" r="1" fill="#94a3b8"/><circle cx="1450" cy="40" r="2" fill="#a78bfa" filter="url(#glow)"/>
    <circle cx="500" cy="60" r="2" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="960" cy="25" r="1.5" fill="#7c3aed" filter="url(#glow)"/>
  </g>

  <!-- Central glow -->
  <rect width="1920" height="600" fill="url(#glowCenter)"/>
  <rect width="1920" height="600" fill="url(#glowGreen)"/>

  <!-- YGGDRASIL TREE -->
  <!-- Roots -->
  <g stroke="#1a202c" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8">
    <path d="M960 500 Q900 530 800 560 Q750 570 700 580"/>
    <path d="M960 500 Q1000 530 1100 555 Q1150 565 1200 580"/>
    <path d="M960 500 Q960 540 960 570 Q960 585 960 600"/>
    <path d="M960 500 Q880 520 780 530 Q720 535 660 540"/>
    <path d="M960 500 Q1040 520 1150 535 Q1200 540 1260 545"/>
  </g>

  <!-- Root glow nodes -->
  <circle cx="700" cy="580" r="4" fill="#7c3aed" opacity="0.4" filter="url(#softGlow)"/>
  <circle cx="1200" cy="580" r="4" fill="#06b6d4" opacity="0.4" filter="url(#softGlow)"/>
  <circle cx="660" cy="540" r="3" fill="#00ff88" opacity="0.3" filter="url(#softGlow)"/>

  <!-- Trunk -->
  <path d="M940 500 Q935 400 938 300 Q940 200 945 140 L955 140 Q960 200 962 300 Q965 400 960 500 Z" fill="url(#treeGrad)" stroke="#4a5568" stroke-width="1"/>

  <!-- Bark texture lines -->
  <g stroke="#4a5568" stroke-width="0.5" opacity="0.5">
    <path d="M945 480 Q948 460 944 440"/>
    <path d="M955 470 Q952 450 956 430"/>
    <path d="M948 350 Q950 330 947 310"/>
    <path d="M953 340 Q951 320 954 300"/>
  </g>

  <!-- Main branches -->
  <g stroke="#2d3748" stroke-width="3" stroke-linecap="round" fill="none">
    <!-- Left branch set -->
    <path d="M945 160 Q900 130 840 110 Q800 98 760 95"/>
    <path d="M948 220 Q900 190 830 175 Q790 168 750 165"/>
    <path d="M948 290 Q890 260 820 245 Q780 238 740 235"/>

    <!-- Right branch set -->
    <path d="M955 150 Q1010 120 1070 105 Q1100 98 1140 95"/>
    <path d="M952 200 Q1010 180 1080 170 Q1120 165 1160 163"/>
    <path d="M952 270 Q1010 250 1080 240 Q1110 235 1140 233"/>

    <!-- Upper branches -->
    <path d="M950 145 Q930 110 905 80 Q885 60 870 45"/>
    <path d="M950 145 Q970 110 995 80 Q1015 60 1030 45"/>
    <path d="M948 155 Q920 105 890 70"/>
    <path d="M952 155 Q980 105 1010 70"/>
  </g>

  <!-- Canopy circles (realm indicators) -->
  <!-- Asgard - top center, gold -->
  <circle cx="950" cy="40" r="18" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.9" filter="url(#softGlow)"/>
  <circle cx="950" cy="40" r="12" fill="#fbbf24" opacity="0.15"/>
  <text x="950" y="44" text-anchor="middle" fill="#fbbf24" font-family="serif" font-size="14" font-weight="bold">ᚨ</text>

  <!-- Vanaheim - left, violet -->
  <circle cx="740" cy="230" r="15" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.8" filter="url(#softGlow)"/>
  <circle cx="740" cy="230" r="9" fill="#a78bfa" opacity="0.12"/>
  <text x="740" y="234" text-anchor="middle" fill="#a78bfa" font-family="serif" font-size="12">ᚹ</text>

  <!-- Alfheim - center-left, amber -->
  <circle cx="760" cy="92" r="15" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="760" cy="92" r="9" fill="#f59e0b" opacity="0.1"/>

  <!-- Svartalfheim - right, stone -->
  <circle cx="1140" cy="93" r="15" fill="none" stroke="#94a3b8" stroke-width="1.5" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="1140" cy="93" r="9" fill="#94a3b8" opacity="0.1"/>

  <!-- Muspelheim - far left, rose -->
  <circle cx="740" cy="232" r="0" fill="none"/>

  <!-- Niflheim -->
  <circle cx="1160" cy="160" r="15" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="1160" cy="160" r="9" fill="#06b6d4" opacity="0.1"/>

  <!-- Midgard - center, emerald -->
  <circle cx="830" cy="170" r="15" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="830" cy="170" r="9" fill="#10b981" opacity="0.1"/>

  <!-- Jotunheim -->
  <circle cx="1080" cy="238" r="15" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="1080" cy="238" r="9" fill="#f472b6" opacity="0.1"/>

  <!-- Helheim - bottom -->
  <circle cx="960" cy="575" r="15" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.8" filter="url(#softGlow)"/>
  <circle cx="960" cy="575" r="9" fill="#ef4444" opacity="0.12"/>
  <text x="960" y="579" text-anchor="middle" fill="#ef4444" font-family="serif" font-size="12">ᚺ</text>

  <!-- Leaf clusters on branches -->
  <g opacity="0.4">
    <circle cx="760" cy="95" r="25" fill="#10b981" opacity="0.08" filter="url(#softGlow)"/>
    <circle cx="840" cy="110" r="30" fill="#7c3aed" opacity="0.06" filter="url(#softGlow)"/>
    <circle cx="1140" cy="98" r="25" fill="#94a3b8" opacity="0.08" filter="url(#softGlow)"/>
    <circle cx="870" cy="45" r="20" fill="#06b6d4" opacity="0.08" filter="url(#softGlow)"/>
    <circle cx="1030" cy="45" r="20" fill="#fbbf24" opacity="0.08" filter="url(#softGlow)"/>
    <circle cx="830" cy="175" r="25" fill="#10b981" opacity="0.06" filter="url(#softGlow)"/>
    <circle cx="1080" cy="240" r="25" fill="#f472b6" opacity="0.06" filter="url(#softGlow)"/>
  </g>

  <!-- Floating runes -->
  <g font-family="serif" opacity="0.2" filter="url(#glow)">
    <text x="200" y="200" fill="#7c3aed" font-size="24" transform="rotate(-15, 200, 200)">ᚱ</text>
    <text x="1700" y="180" fill="#06b6d4" font-size="20" transform="rotate(10, 1700, 180)">ᛏ</text>
    <text x="300" y="400" fill="#00ff88" font-size="18" transform="rotate(-5, 300, 400)">ᛖ</text>
    <text x="1600" y="380" fill="#fbbf24" font-size="22" transform="rotate(8, 1600, 380)">ᛗ</text>
    <text x="500" y="150" fill="#a78bfa" font-size="16">ᚻ</text>
    <text x="1400" y="140" fill="#06b6d4" font-size="16">ᛉ</text>
  </g>

  <!-- Mist layers at bottom -->
  <rect x="0" y="520" width="1920" height="80" fill="url(#skyGrad)" opacity="0.5"/>
  <ellipse cx="400" cy="560" rx="300" ry="30" fill="#1a202c" opacity="0.3"/>
  <ellipse cx="1400" cy="550" rx="350" ry="25" fill="#1a202c" opacity="0.25"/>
  <ellipse cx="960" cy="570" rx="400" ry="20" fill="#0d1b2a" opacity="0.4"/>

  <!-- Title text -->
  <text x="960" y="320" text-anchor="middle" fill="#e2e8f0" font-family="'Inter', 'Segoe UI', sans-serif" font-size="48" font-weight="800" letter-spacing="6" opacity="0.95">YGGDRASIL</text>
  <text x="960" y="355" text-anchor="middle" fill="#a78bfa" font-family="'Inter', 'Segoe UI', sans-serif" font-size="16" font-weight="500" letter-spacing="8" opacity="0.7">NINE REALMS · ONE TREE</text>
</svg>
