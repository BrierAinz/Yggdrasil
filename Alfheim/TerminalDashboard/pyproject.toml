[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "terminaldashboard"
version = "0.1.0"
description = "Yggdrasil Terminal Dashboard – TUI for monitoring all realms"
requires-python = ">=3.12"
license = {text = "MIT"}
dependencies = [
    "textual>=0.40",
    "rich>=13.0",
    "psutil>=5.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[project.scripts]
tui = "tui.app:main"

[tool.setuptools.packages.find]
where = ["."]

[tool.isort]
profile = "black"
known_first_party = ["tui"]

[tool.black]
line-length = 100
