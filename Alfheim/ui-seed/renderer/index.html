<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lilith Dashboard v2.0</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #0f0f0f; color: #e0e0e0; }
        h1 { color: #4fc3f7; margin-top: 0; }
        #layout { display: flex; gap: 20px; }
        #main { flex: 1; }
        #sidebar { width: 300px; }
        #chat-history { height: 400px; overflow-y: auto; border: 1px solid #333; padding: 10px; margin-bottom: 10px; background: #1a1a1a; border-radius: 8px; }
        .user { color: #4fc3f7; margin: 4px 0; }
        .bot { color: #81c784; margin: 4px 0; }
        .tool { color: #ffb74d; font-size: 0.85em; margin: 2px 0 8px 16px; }
        .error { color: #e57373; }
        input { width: calc(100% - 90px); padding: 10px; background: #222; color: #eee; border: 1px solid #444; border-radius: 4px; }
        button { padding: 10px 16px; background: #4fc3f7; color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #29b6f6; }
        #tools-list { list-style: none; padding: 0; }
        #tools-list li { padding: 6px; border-bottom: 1px solid #333; font-size: 0.9em; }
        .panel { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px; margin-bottom: 16px; }
        .panel h3 { margin-top: 0; color: #81c784; }
    </style>
</head>
<body>
    <h1>Lilith Dashboard v2.0</h1>
    <div id="layout">
        <div id="main">
            <div id="chat-history"></div>
            <input id="message-input" type="text" placeholder="Escribe a Lilith..." onkeydown="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()">Enviar</button>
        </div>
        <div id="sidebar">
            <div class="panel">
                <h3>Tools Disponibles</h3>
                <ul id="tools-list"><li>Cargando...</li></ul>
            </div>
            <div class="panel">
                <h3>Status</h3>
                <p>API: <span id="api-status">Conectando...</span></p>
                <p>Modelo: auto</p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
