<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lilith Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Particle Canvas (deep background layer) -->
    <canvas id="particle-canvas"></canvas>

    <!-- Ambient CSS particles overlay -->
    <div id="rune-particles" aria-hidden="true"></div>

    <!-- Eldritch vortex overlay -->
    <div id="eldritch-vortex" aria-hidden="true">
        <div class="vortex-ring v1"></div>
        <div class="vortex-ring v2"></div>
        <div class="vortex-ring v3"></div>
    </div>

    <!-- Cosmic fog layers -->
    <div id="cosmic-fog" aria-hidden="true">
        <div class="fog-layer fog-1"></div>
        <div class="fog-layer fog-2"></div>
        <div class="fog-layer fog-3"></div>
    </div>

    <!-- Rune sigil border overlay -->
    <div id="sigil-border" aria-hidden="true">
        <div class="sigil-corner sigil-tl"></div>
        <div class="sigil-corner sigil-tr"></div>
        <div class="sigil-corner sigil-bl"></div>
        <div class="sigil-corner sigil-br"></div>
        <div class="sigil-edge sigil-top"></div>
        <div class="sigil-edge sigil-bottom"></div>
        <div class="sigil-edge sigil-left"></div>
        <div class="sigil-edge sigil-right"></div>
    </div>

    <div id="app">
        <!-- Header -->
        <header id="header">
            <div class="header-left">
                <span class="logo">&#x2726;</span>
                <span class="title" id="title-lilith">LILITH</span>
                <span class="version">v3.0</span>
            </div>
            <div class="header-center">
                <div id="connection-status" class="status-rune disconnected" title="Disconnected">
                    <span class="rune-inner">&#x29BF;</span>
                </div>
                <span id="status-text">Summoning...</span>
            </div>
            <div class="header-right">
                <button id="btn-layout" onclick="toggleLayout()" title="Toggle layout">&#9638;&#9638;&#9638;</button>
                <button id="btn-settings" onclick="toggleSettings()" title="Settings">&#x2699;</button>
            </div>
        </header>

        <!-- Main Content: Multi-Pane -->
        <main id="main-content">
            <!-- Chat Pane -->
            <div id="pane-chat" class="pane active">
                <div class="pane-header">
                    <span class="pane-icon">&#x1F4AC;</span>
                    <span class="pane-rune">&#x16B1;</span>
                    <span class="pane-title">Chat</span>
                    <span class="pane-rune">&#x16B1;</span>
                </div>
                <div class="pane-body" id="chat-body">
                    <div id="chat-messages"></div>
                    <!-- Summoning circle typing indicator -->
                    <div id="typing-indicator" class="hidden">
                        <div class="summoning-circle">
                            <div class="circle-ring"></div>
                            <div class="circle-ring-inner"></div>
                            <div class="circle-ring-outer"></div>
                            <div class="circle-rune r1">&#x16B1;</div>
                            <div class="circle-rune r2">&#x16A2;</div>
                            <div class="circle-rune r3">&#x16B7;</div>
                            <div class="circle-rune r4">&#x16CF;</div>
                            <div class="circle-rune r5">&#x16BA;</div>
                            <div class="circle-rune r6">&#x16C1;</div>
                            <span class="circle-text">Communing</span>
                        </div>
                    </div>
                </div>
                <div class="pane-footer">
                    <div class="chat-input-wrapper">
                        <input type="text" id="chat-input" placeholder="Speak unto the void..." autocomplete="off">
                        <button id="chat-send" onclick="sendChat()">&#x27A4;</button>
                    </div>
                </div>
            </div>

            <!-- Terminal Pane -->
            <div id="pane-terminal" class="pane">
                <div class="pane-header">
                    <span class="pane-icon">&#x2318;</span>
                    <span class="pane-rune">&#x16C1;</span>
                    <span class="pane-title">Terminal</span>
                    <span class="pane-rune">&#x16C1;</span>
                </div>
                <div class="pane-body grimoire-body">
                    <div id="terminal-output" class="terminal-content"></div>
                    <div class="terminal-input-line">
                        <span class="prompt">&#x16BA; </span>
                        <input type="text" id="terminal-input" placeholder="Incant command..." autocomplete="off">
                    </div>
                </div>
            </div>

            <!-- System Pane -->
            <div id="pane-system" class="pane">
                <div class="pane-header">
                    <span class="pane-icon">&#x2699;</span>
                    <span class="pane-rune">&#x16A5;</span>
                    <span class="pane-title">System</span>
                    <span class="pane-rune">&#x16A5;</span>
                </div>
                <div class="pane-body">
                    <div id="system-info" class="system-grid">
                        <div class="system-item">
                            <span class="system-label">&#x16A5; Model</span>
                            <span class="system-value" id="sys-model">---</span>
                        </div>
                        <div class="system-item">
                            <span class="system-label">&#x16A0; Memory</span>
                            <span class="system-value" id="sys-memory">---</span>
                        </div>
                        <div class="system-item">
                            <span class="system-label">&#x16A2; Swarm</span>
                            <span class="system-value" id="sys-swarm">---</span>
                        </div>
                        <div class="system-item">
                            <span class="system-label">&#x16CF; MCP</span>
                            <span class="system-value" id="sys-mcp">---</span>
                        </div>
                        <div class="system-item">
                            <span class="system-label">&#x16B7; Uptime</span>
                            <span class="system-value" id="sys-uptime">---</span>
                        </div>
                        <div class="system-item">
                            <span class="system-label">&#x16C1; Clients</span>
                            <span class="system-value" id="sys-clients">---</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Memory Pane -->
            <div id="pane-memory" class="pane">
                <div class="pane-header">
                    <span class="pane-icon">&#x1F9E0;</span>
                    <span class="pane-rune">&#x16A0;</span>
                    <span class="pane-title">Memory</span>
                    <span class="pane-rune">&#x16A0;</span>
                    <div class="memory-tabs">
                        <button class="memory-tab active" data-tab="graph" onclick="switchMemoryTab('graph')">&#x16A0; Graph</button>
                        <button class="memory-tab" data-tab="entities" onclick="switchMemoryTab('entities')">&#x16A2; Entities</button>
                        <button class="memory-tab" data-tab="facts" onclick="switchMemoryTab('facts')">&#x16CF; Facts</button>
                        <button class="memory-tab" data-tab="episodes" onclick="switchMemoryTab('episodes')">&#x16B7; Episodes</button>
                    </div>
                </div>
                <div class="pane-body">
                    <div class="memory-search">
                        <input type="text" id="memory-search-input" placeholder="Search the archives..." autocomplete="off">
                        <button id="memory-search-btn" onclick="searchMemory()">&#x27A4;</button>
                    </div>
                    <div class="memory-stats-bar" id="memory-stats-bar">
                        <span class="stat-chip" id="mem-stat-episodes" title="Episodes">&#x16A2; 0</span>
                        <span class="stat-chip" id="mem-stat-entities" title="Entities">&#x16A2; 0</span>
                        <span class="stat-chip" id="mem-stat-facts" title="Facts">&#x16CF; 0</span>
                        <span class="stat-chip" id="mem-stat-errors" title="Errors">&#x16BA; 0</span>
                    </div>
                    <!-- Memory Tab: Graph -->
                    <div id="memory-tab-graph" class="memory-tab-content active">
                        <canvas id="memory-graph-canvas" width="600" height="400"></canvas>
                        <div id="graph-tooltip" class="graph-tooltip hidden"></div>
                        <div class="graph-controls">
                            <button class="graph-btn" onclick="memoryGraphZoom(1.2)" title="Zoom in">&#x2B;</button>
                            <button class="graph-btn" onclick="memoryGraphZoom(0.8)" title="Zoom out">&#x2212;</button>
                            <button class="graph-btn" onclick="memoryGraphReset()" title="Reset view">&#x21BA;</button>
                        </div>
                    </div>
                    <!-- Memory Tab: Entities -->
                    <div id="memory-tab-entities" class="memory-tab-content">
                        <div id="memory-entities-list" class="memory-list"></div>
                    </div>
                    <!-- Memory Tab: Facts -->
                    <div id="memory-tab-facts" class="memory-tab-content">
                        <div id="memory-facts-list" class="memory-list"></div>
                    </div>
                    <!-- Memory Tab: Episodes -->
                    <div id="memory-tab-episodes" class="memory-tab-content">
                        <div id="memory-episodes-list" class="memory-list"></div>
                    </div>
                    <!-- Search results (replaces tabs when searching) -->
                    <div id="memory-search-results" class="memory-list hidden"></div>
                </div>
            </div>
        </main>

        <!-- Status Bar -->
        <footer id="status-bar">
            <span id="statusbar-left">&#x16B7; Lilith v3.0 &#x2014; The Void Stares Back &#x16B7;</span>
            <span id="statusbar-center"></span>
            <span id="statusbar-right"></span>
        </footer>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-backdrop" onclick="toggleSettings()"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>&#x16A0; Arcane Settings &#x16A0;</h2>
                    <button class="modal-close" onclick="toggleSettings()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="setting-item">
                        <label>WebSocket Portal</label>
                        <input type="text" id="setting-ws-url" value="ws://localhost:8765">
                    </div>
                    <div class="setting-item">
                        <label>Visage</label>
                        <select id="setting-theme">
                            <option value="dark-fantasy">Dark Fantasy</option>
                            <option value="midnight">Midnight</option>
                            <option value="blood-moon">Blood Moon</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>Script Size</label>
                        <input type="range" id="setting-font-size" min="12" max="20" value="14">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
