[pytest]
testpaths = tests Asgard/lilith-core/tests Asgard/lilith-tools/tests Asgard/lilith-memory/tests Asgard/lilith-api/tests Asgard/lilith-cli/tests Asgard/lilith-orchestrator/tests Vanaheim/vanaheim-framework/tests Muspelheim/AutoSub/tests Muspelheim/ForgeMaster/tests Alfheim/TerminalDashboard/tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers --ignore=Asgard/Lilith --ignore=Helheim --ignore=Niflheim --ignore=Jotunheim --ignore=Svartalfheim --ignore=Midgard --ignore=website-v2
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
