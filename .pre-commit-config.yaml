exclude: ^(Helheim|Niflheim|Muspelheim/AI-Influencer|Muspelheim/AutoMode|Muspelheim/Docs|Asgard/Lilith|Asgard/Hermes-Lilith|Asgard/Dashboards|Asgard/Lilith_backup|Vanaheim/Agents|Vanaheim/Bots_Lilith_v5|Vanaheim/Config|Vanaheim/Core|Vanaheim/Council|Vanaheim/bots|Vanaheim/bifrost|Svartalfheim|Midgard|\.git|__pycache__|\.venv|venv|node_modules|website-v2)/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ['--fix']
      - id: ruff-format
