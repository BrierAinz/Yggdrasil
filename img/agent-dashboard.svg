<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Terminal Dashboard — Midgard App -->
  <!-- Terminal window + charts + grid, emerald green palette -->

  <circle cx="100" cy="100" r="90" fill="rgba(0,255,136,0.03)" stroke="rgba(0,255,136,0.12)" stroke-width="1"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(0,255,136,0.06)" stroke-width="0.5" stroke-dasharray="4,8"/>

  <!-- Terminal window frame -->
  <rect x="35" y="35" rx="5" width="130" height="95" fill="rgba(0,255,136,0.04)" stroke="#00ff88" stroke-width="1.2"/>
  <!-- Title bar -->
  <rect x="35" y="35" rx="5" width="130" height="14" fill="rgba(0,255,136,0.08)" stroke="#00ff88" stroke-width="0.8"/>
  <!-- Window buttons -->
  <circle cx="46" cy="42" r="2.5" fill="#ff3366" opacity="0.6"/>
  <circle cx="55" cy="42" r="2.5" fill="#C7A44A" opacity="0.6"/>
  <circle cx="64" cy="42" r="2.5" fill="#00ff88" opacity="0.6"/>
  <!-- Title text -->
  <text x="100" y="44" font-family="monospace" font-size="6" fill="#00ff88" text-anchor="middle" opacity="0.5">lilith-dashboard</text>

  <!-- Terminal content lines -->
  <g font-family="monospace" font-size="5" opacity="0.5" fill="#00ff88">
    <text x="42" y="60">λ status</text>
    <text x="42" y="67" opacity="0.7">├── memory: ● active</text>
    <text x="42" y="74" opacity="0.6">├── gateway: ● active</text>
    <text x="42" y="81" opacity="0.5">├── providers: ● 3 loaded</text>
    <text x="42" y="88" opacity="0.4">└── swarm:    ○ idle</text>
  </g>

  <!-- Cursor blink -->
  <rect x="42" y="93" width="12" height="5" fill="#00ff88" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0.05;0.15" dur="1.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Mini chart area (right side) -->
  <rect x="105" y="55" rx="2" width="52" height="28" fill="rgba(0,255,136,0.03)" stroke="#00ff88" stroke-width="0.5" opacity="0.5"/>
  <!-- Bar chart -->
  <g fill="#00ff88" opacity="0.3">
    <rect x="110" y="72" width="4" height="8" rx="1"/>
    <rect x="117" y="66" width="4" height="14" rx="1"/>
    <rect x="124" y="70" width="4" height="10" rx="1"/>
    <rect x="131" y="62" width="4" height="18" rx="1"/>
    <rect x="138" y="68" width="4" height="12" rx="1"/>
    <rect x="145" y="64" width="4" height="16" rx="1"/>
  </g>

  <!-- Terminal bottom bar -->
  <rect x="35" y="125" rx="0" width="130" height="5" fill="rgba(0,255,136,0.06)" stroke="#00ff88" stroke-width="0.5"/>
  <!-- Status indicators -->
  <circle cx="45" cy="127.5" r="1.5" fill="#00ff88" opacity="0.6"/>
  <text x="50" y="129" font-family="monospace" font-size="3.5" fill="#00ff88" opacity="0.4">CPU 12%</text>
  <circle cx="80" cy="127.5" r="1.5" fill="#C7A44A" opacity="0.6"/>
  <text x="85" y="129" font-family="monospace" font-size="3.5" fill="#C7A44A" opacity="0.4">MEM 48%</text>
  <circle cx="118" cy="127.5" r="1.5" fill="#aa55ff" opacity="0.6"/>
  <text x="123" y="129" font-family="monospace" font-size="3.5" fill="#aa55ff" opacity="0.4">GPU 62%</text>

  <!-- Grid / dashboard panes (below terminal) -->
  <g opacity="0.4">
    <rect x="40" y="140" rx="2" width="38" height="25" fill="rgba(0,255,136,0.03)" stroke="#00ff88" stroke-width="0.5"/>
    <rect x="82" y="140" rx="2" width="38" height="25" fill="rgba(170,85,255,0.03)" stroke="#aa55ff" stroke-width="0.5"/>
    <rect x="124" y="140" rx="2" width="38" height="25" fill="rgba(199,164,74,0.03)" stroke="#C7A44A" stroke-width="0.5"/>
    <!-- Mini content -->
    <text x="59" y="152" font-family="monospace" font-size="4" fill="#00ff88" text-anchor="middle" opacity="0.6">log</text>
    <text x="101" y="152" font-family="monospace" font-size="4" fill="#aa55ff" text-anchor="middle" opacity="0.6">memory</text>
    <text x="143" y="152" font-family="monospace" font-size="4" fill="#C7A44A" text-anchor="middle" opacity="0.6">tools</text>
  </g>

  <!-- Rune ᛗ (Midgard — Mannaz) -->
  <g stroke="#00ff88" stroke-width="1.2" stroke-linecap="round" opacity="0.3" transform="translate(28,115)">
    <line x1="0" y1="-10" x2="0" y2="10"/>
    <line x1="-5" y1="-5" x2="0" y2="0"/>
    <line x1="5" y1="-5" x2="0" y2="0"/>
    <line x1="-5" y1="5" x2="0" y2="0"/>
    <line x1="5" y1="5" x2="0" y2="0"/>
  </g>

  <!-- Floating runes -->
  <g fill="rgba(0,255,136,0.15)" font-family="serif" font-size="10">
    <text x="165" y="55">ᚠ</text>
    <text x="30" y="60">ᛟ</text>
  </g>
</svg>
